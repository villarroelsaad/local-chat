services:
  frontend:
  
    build: ./front
    container_name: nextjs_frontend
    command: sh -c "npm test -- --watchAll=false && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app
      - /app/node_modules # Evita que los módulos locales pisen a los del contenedor
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./back
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  ollama-pull-model:
    image: curlimages/curl:latest
    container_name: ollama_pull_model
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "sleep 5;
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"phi3\"}';"
volumes:
  ollama_data:
  postgres_data:


